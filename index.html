<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step Generator Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f2a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="https://i.supaimg.com/bd62b939-bede-4569-8006-ec143f41d2d7/01bf8344-0b5b-4dca-b861-8f6a2dace015.png">

<style>
html, body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: radial-gradient(ellipse at bottom, #0b0f2a 0%, #000 100%);
    color: white;
    text-align: center;
    overflow-x: hidden;
    overflow-y: auto;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* TOP AUTH BUTTONS */
.top-auth-buttons {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 6px;
    z-index: 999;
}

.top-auth-buttons button {
    padding: 6px 12px;
    font-size: 12px;
    border-radius: 8px;
    border: none;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.top-auth-buttons button:first-child { background: linear-gradient(135deg, #6366f1, #3b82f6); }
.top-auth-buttons button:last-child { background: linear-gradient(135deg, #22c55e, #14b8a6); }

/* HEADER */
.header-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 20px;
    gap: 15px;
}

h1 { margin: 0; color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }

.header-icon {
    width: 65px;
    height: 65px;
    object-fit: cover;
    border-radius: 50%; 
    border: 2px solid rgba(56, 189, 248, 0.3);
}

.container { padding: 20px; }

.card {
    background: rgba(255,255,255,0.08);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    max-width: 400px;
    margin: auto;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
}

input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.3);
    color: white;
    outline: none;
}

.button-group {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 15px;
    flex-wrap: wrap;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button.reset { background: #ef4444; }
button.copy { background: #3b82f6; }

/* Prediction System Button */
button.predict-btn { 
    background: linear-gradient(135deg, #f59e0b, #d97706); 
    width: 80%;
    box-shadow: 0 0 15px rgba(245, 158, 11, 0.4);
    margin-bottom: 20px;
}

/* Prediction Result Box */
#predict-display {
    margin: 15px auto;
    padding: 20px;
    background: rgba(0, 0, 0, 0.85);
    border-radius: 15px;
    border: 1px solid rgba(245, 158, 11, 0.6);
    display: none;
    width: 90%;
    max-width: 340px;
}

.market-label { color: #38bdf8; font-weight: bold; font-size: 15px; }
.timer-label { color: #ffcc00; font-size: 14px; font-family: monospace; }
.p-number { color: #f59e0b; font-weight: bold; font-size: 17px; margin: 10px 0; }

/* The Dynamic Result Container */
.result-slot {
    min-height: 80px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.1);
    margin-top: 15px;
    padding-top: 10px;
}

.show-res-btn {
    background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
    padding: 10px 35px;
    font-size: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
    border: none;
    color: white;
    font-weight: bold;
}

.p-result { 
    font-size: 28px; 
    font-weight: 900; 
    transition: 0.5s;
}

/* FOOTER */
footer {
    margin-top: 40px;
    padding-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.dev-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
}

.dev-text { font-size: 18px; font-weight: 800; color: #ffffff; }
.dev-image { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid white; }

/* TABLES & OTHER */
table { margin: 20px auto; border-collapse: collapse; width: 100%; }
td, th { border: 1px solid rgba(255,255,255,0.1); padding: 12px; }
th { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
.total { margin-top: 15px; font-size: 20px; color: #4ade80; font-weight: bold; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; }

.floating-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #22c55e;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}
</style>
</head>

<body>

<canvas id="starsCanvas"></canvas>

<div class="top-auth-buttons">
    <button onclick="openRegister()">Register</button>
    <button onclick="openLogin()">Login</button>
</div>

<div class="header-container">
    <img src="https://i.supaimg.com/bd62b939-bede-4569-8006-ec143f41d2d7/01bf8344-0b5b-4dca-b861-8f6a2dace015.png" class="header-icon">
    <h1>Step Generator Pro</h1>
</div>

<div class="container">
    <div class="card">
        <input type="number" id="amount" placeholder="Total Amount (1000)">
        <input type="number" id="steps" placeholder="Total Steps (8)">

        <div class="button-group">
            <button onclick="generate()">Generate</button>
            <button class="reset" onclick="resetForm()">Reset</button>
            <button class="copy" id="copyBtn" onclick="copyToClipboard()" style="display:none;">Copy List</button>
        </div>

        <div id="result"></div>
    </div>
</div>

<footer>
    <button class="predict-btn" onclick="openPredictBox()">Prediction System</button>

    <div id="predict-display">
        <div class="market-label">Win Go 1 Min</div>
        <div class="timer-label" id="realtime-seconds">Next Market: 00s</div>
        <div class="p-number" id="period-num">Period: --</div>
        
        <div class="result-slot" id="main-result-area">
            <button class="show-res-btn" id="click-result-btn" onclick="triggerRealisticAnalysis()">Result</button>
            <div class="p-result" id="prediction-text"></div>
        </div>
    </div>

    <div class="dev-container">
        <img src="https://i.supaimg.com/bd62b939-bede-4569-8006-ec143f41d2d7/532211f1-9f43-4a22-8471-d3a0bb9e9b1e.jpg" class="dev-image">
        <span class="dev-text">Developer: Tanvir Boss</span>
    </div>
</footer>

<div class="floating-btn" onclick="openChat()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" style="width:40px; height:40px;">
</div>

<script>
// --- PWA SERVICE WORKER REGISTRATION ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      console.log('SW Registered!', reg.scope);
    }).catch(err => {
      console.log('SW Registration failed:', err);
    });
  });
}

// --- TANVIR BOSS: AUTOMATIC SYNC LOGIC (Reset at 06:00 AM Daily) ---
let activePeriod = "";
let lockedData = null;

function updateClock() {
    const now = new Date();
    
    let year = now.getFullYear();
    let month = (now.getMonth() + 1).toString().padStart(2, '0');
    let day = now.getDate().toString().padStart(2, '0');
    
    const currentHour = now.getHours();
    const currentMin = now.getMinutes();
    const currentSec = now.getSeconds();

    let effectiveDate = new Date(now);
    if (currentHour < 6) {
        effectiveDate.setDate(now.getDate() - 1);
    }
    
    const effYear = effectiveDate.getFullYear();
    const effMonth = (effectiveDate.getMonth() + 1).toString().padStart(2, '0');
    const effDay = effectiveDate.getDate().toString().padStart(2, '0');
    const dateStr = `${effYear}${effMonth}${effDay}`;

    document.getElementById("realtime-seconds").innerHTML = `Next Market: ${(60 - currentSec).toString().padStart(2, '0')}s`;

    let startOfPeriod = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 6, 0, 0);
    if (currentHour < 6) {
        startOfPeriod.setDate(now.getDate() - 1);
    }

    const minutesPassed = Math.floor((now - startOfPeriod) / 60000);
    const periodSequence = 10001 + minutesPassed; 

    const currentP = `${dateStr}1000${periodSequence}`;

    if (activePeriod !== currentP) {
        activePeriod = currentP;
        lockedData = null; 
        document.getElementById("period-num").innerHTML = "Period: " + activePeriod;
        document.getElementById("prediction-text").innerHTML = ""; 
        document.getElementById("click-result-btn").style.display = "block"; 
    }
}
setInterval(updateClock, 1000);
updateClock(); 

// --- TANVIR BOSS: PREDICTION ACCESS WITH UID VERIFICATION ---
async function openPredictBox() {
    const box = document.getElementById("predict-display");
    
    // যদি বক্স অলরেডি খোলা থাকে, তবে বন্ধ হবে
    if (box.style.display === "block") {
        box.style.display = "none";
        return;
    }

    // UID ইনপুট নেওয়ার প্রম্পট
    let userUID = prompt("Please Enter Your UID to access Prediction:");
    
    if (userUID === null || userUID === "") {
        alert("UID is required!");
        return;
    }

    // ভার্সেল এপিআই চেক
    try {
        const response = await fetch(`/api/index.php?uid=${userUID}`);
        const data = await response.json();

        if (data.status === "success") {
            box.style.display = "block";
        } else {
            alert("Invalid UID! Please register through our link.");
        }
    } catch (error) {
        console.error("Verification Error:", error);
        alert("Server error. Please try again later.");
    }
}

function triggerRealisticAnalysis() {
    const resDiv = document.getElementById("prediction-text");
    const btn = document.getElementById("click-result-btn");
    
    btn.style.display = "none"; 
    resDiv.style.color = "#38bdf8";
    resDiv.style.fontSize = "18px";
    resDiv.innerHTML = "Analyzing Market Chart...";

    setTimeout(() => {
        if (!lockedData) {
            const types = ["BIG", "SMALL"];
            const colors = ["GREEN", "RED"];
            lockedData = {
                val: types[Math.floor(Math.random() * types.length)],
                col: colors[Math.floor(Math.random() * colors.length)]
            };
        }
        resDiv.style.fontSize = "28px";
        resDiv.innerHTML = `${lockedData.val} - ${lockedData.col}`;
        resDiv.style.color = (lockedData.col === "GREEN") ? "#4ade80" : "#ef4444";
    }, 2000);
}

// --- GENERATOR LOGIC ---
function generate() {
    let amount = parseFloat(document.getElementById("amount").value);
    let steps = parseInt(document.getElementById("steps").value);
    let result = document.getElementById("result");
    let copyBtn = document.getElementById("copyBtn");

    if (isNaN(amount) || isNaN(steps) || amount <= 0 || steps <= 0) {
        result.innerHTML = "<p style='color:red;'>❌ Invalid input</p>";
        copyBtn.style.display = "none";
        return;
    }

    let first = amount / (Math.pow(2, steps) - 1);
    let html = "<table><tr><th>Step</th><th>Amount</th></tr>";
    let total = 0;

    for (let i = 0; i < steps; i++) {
        let val = first * Math.pow(2, i);
        total += val;
        html += `<tr><td>Step ${i+1}</td><td>${val.toFixed(2)} ৳</td></tr>`;
    }
    html += "</table><div class='total'>Total: " + total.toFixed(2) + " ৳</div>";
    result.innerHTML = html;
    copyBtn.style.display = "inline-block";
}

function resetForm() {
    document.getElementById("amount").value = "";
    document.getElementById("steps").value = "";
    document.getElementById("result").innerHTML = "";
    document.getElementById("copyBtn").style.display = "none";
}

function copyToClipboard() {
    const table = document.querySelector("table");
    const totalDiv = document.querySelector(".total");
    if(!table) return;
    let text = "Step List:\n" + [...table.querySelectorAll("tr")].slice(1).map(r => r.innerText.replace(/\t/g, ": ")).join("\n") + "\n" + totalDiv.innerText;
    const el = document.createElement('textarea');
    el.value = text; document.body.appendChild(el); el.select();
    document.execCommand('copy'); document.body.removeChild(el);
    alert("Copied!");
}

function openRegister() { window.open("https://deshclub2.com/#/register?invitationCode=87633124058", "_blank"); }
function openLogin() { window.open("https://deshclub1.com", "_blank"); }
function openChat() { window.open("https://t.me/THIS_IS_BOSS", "_blank"); }

// Star Background
const canvas = document.getElementById("starsCanvas");
const ctx = canvas.getContext("2d");
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.onresize = resize;
let stars = Array(100).fill().map(() => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, vx: Math.random()*0.5-0.25, vy: Math.random()*0.5-0.25 }));
function anim() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s => {
        s.x+=s.vx; s.y+=s.vy;
        if(s.x<0||s.x>canvas.width) s.vx*=-1; if(s.y<0||s.y>canvas.height) s.vy*=-1;
        ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fillStyle="white"; ctx.fill();
    });
    requestAnimationFrame(anim);
}
anim();
</script>

</body>
</html>
