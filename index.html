<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step Generator Galaxy Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(ellipse at bottom, #0b0f2a 0%, #000 100%);
    color: white;
    text-align: center;
    overflow: hidden;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

h1 {
    margin-top: 20px;
    color: #38bdf8;
}

.container {
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    max-width: 350px;
    margin: auto;
}

input {
    width: 90%;
    padding: 12px;
    margin: 8px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

table {
    margin: 20px auto;
    border-collapse: collapse;
    width: 90%;
    max-width: 400px;
}

td, th {
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px;
}

th {
    background: #22c55e;
}

.total {
    margin-top: 15px;
    font-size: 20px;
    color: #4ade80;
}

footer {
    margin-top: 30px;
    color: #94a3b8;
    font-size: 13px;
}

.floating-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #22c55e;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

.tooltip {
    position: absolute;
    bottom: 75px;
    right: 0;
    background: black;
    padding: 5px 10px;
    border-radius: 5px;
    display: none;
}

.floating-btn:hover .tooltip {
    display: block;
}
</style>
</head>

<body>

<canvas id="starsCanvas"></canvas>

<h1>🌌 Step Generator Pro</h1>

<div class="container">
<div class="card">

<input type="number" id="amount" placeholder="মোট টাকা">
<input type="number" id="steps" placeholder="স্টেপ সংখ্যা">

<button onclick="generate()">Generate</button>

<div id="result"></div>

</div>
</div>

<footer>
👨‍💻 Developer: Tanvir Boss
</footer>

<!-- 🔥 শুধু এখানে পরিবর্তন করা হয়েছে -->
<div class="floating-btn" onclick="openChat()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" 
         alt="Telegram" 
         style="width:40px; height:40px;">
    <div class="tooltip">Contact Developer</div>
</div>

<script>
// Canvas
const canvas = document.getElementById("starsCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let stars = [];
let mouse = { x: null, y: null };

for (let i = 0; i < 120; i++) {
    stars.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        size: Math.random() * 2,
        vx: Math.random() * 0.5 - 0.25,
        vy: Math.random() * 0.5 - 0.25
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    stars.forEach(star => {
        if (mouse.x !== null) {
            let dx = star.x - mouse.x;
            let dy = star.y - mouse.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < 100) {
                star.x += dx / 20;
                star.y += dy / 20;
            }
        }

        star.x += star.vx;
        star.y += star.vy;

        if (star.x < 0 || star.x > canvas.width) star.vx *= -1;
        if (star.y < 0 || star.y > canvas.height) star.vy *= -1;

        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();
    });

    requestAnimationFrame(animate);
}
animate();

window.addEventListener("mousemove", e => {
    mouse.x = e.x;
    mouse.y = e.y;
});

window.addEventListener("touchmove", e => {
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
});

// Step Generator
function generate() {
    let amount = parseFloat(document.getElementById("amount").value);
    let steps = parseInt(document.getElementById("steps").value);
    let result = document.getElementById("result");

    if (!amount || !steps || amount <= 0 || steps <= 0) {
        result.innerHTML = "❌ সঠিক ইনপুট দাও";
        return;
    }

    let ratio = 2;
    let first = amount * (ratio - 1) / (Math.pow(ratio, steps) - 1);
    let total = 0;

    let html = "<table><tr><th>Step</th><th>Amount</th></tr>";

    for (let i = 0; i < steps; i++) {
        let value = first * Math.pow(ratio, i);
        total += value;
        html += `<tr><td>${i+1}</td><td>${value.toFixed(2)}</td></tr>`;
    }

    html += "</table>";
    html += `<div class="total">মোট: ${total.toFixed(2)} টাকা</div>`;

    result.innerHTML = html;
}

function openChat() {
    window.open("https://t.me/THIS_IS_BOSS", "_blank");
}
</script>

</body>
    </html>
