<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step Generator Pro</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: radial-gradient(ellipse at bottom, #0b0f2a 0%, #000 100%);
    color: white;
    text-align: center;
    overflow-x: hidden;
    overflow-y: auto;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* 🔥 TOP BUTTONS */
.top-auth-buttons {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 6px;
    z-index: 999;
}

.top-auth-buttons button {
    padding: 6px 12px;
    font-size: 12px;
    border-radius: 8px;
    border: none;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.top-auth-buttons button:first-child {
    background: linear-gradient(135deg, #6366f1, #3b82f6);
}

.top-auth-buttons button:last-child {
    background: linear-gradient(135deg, #22c55e, #14b8a6);
}

.top-auth-buttons button:hover {
    transform: translateY(-2px);
    filter: brightness(1.1);
}

/* HEADER */
.header-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 20px;
    gap: 15px;
}

h1 {
    margin: 0;
    color: #38bdf8;
    text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
}

.header-icon {
    width: 65px;
    height: 65px;
    object-fit: cover;
    border-radius: 50%; 
    border: 2px solid rgba(56, 189, 248, 0.3);
}

.container {
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    max-width: 400px;
    margin: auto;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
}

input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.3);
    color: white;
    outline: none;
}

input:focus {
    border-color: #22c55e;
}

.button-group {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 15px;
    flex-wrap: wrap;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button.reset { background: #ef4444; }
button.copy { background: #3b82f6; }

button:hover {
    transform: translateY(-2px);
    filter: brightness(1.1);
}

table {
    margin: 20px auto;
    border-collapse: collapse;
    width: 100%;
}

td, th {
    border: 1px solid rgba(255,255,255,0.1);
    padding: 12px;
}

th {
    background: rgba(34, 197, 94, 0.2);
    color: #4ade80;
}

.total {
    margin-top: 15px;
    font-size: 20px;
    color: #4ade80;
    font-weight: bold;
    border-top: 1px solid rgba(255,255,255,0.2);
    padding-top: 10px;
}

footer {
    margin-top: 30px;
    padding-bottom: 20px;
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.dev-text {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
}

.dev-image {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    object-fit: cover;
    border: 1.5px solid rgba(255,255,255,0.5);
}

.floating-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #22c55e;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
}

.tooltip {
    position: absolute;
    bottom: 75px;
    right: 0;
    background: black;
    padding: 5px 10px;
    border-radius: 5px;
    display: none;
    white-space: nowrap;
}

.floating-btn:hover .tooltip {
    display: block;
}
</style>
</head>

<body>

<canvas id="starsCanvas"></canvas>

<div class="top-auth-buttons">
    <button onclick="openRegister()">Register</button>
    <button onclick="openLogin()">Login</button>
</div>

<div class="header-container">
    <img src="https://i.supaimg.com/bd62b939-bede-4569-8006-ec143f41d2d7/01bf8344-0b5b-4dca-b861-8f6a2dace015.png" class="header-icon">
    <h1>Step Generator Pro</h1>
</div>

<div class="container">
    <div class="card">
        <input type="number" id="amount" placeholder="Total Amount (1000)">
        <input type="number" id="steps" placeholder="Total Steps (8)">

        <div class="button-group">
            <button onclick="generate()">Generate</button>
            <button class="reset" onclick="resetForm()">Reset</button>
            <button class="copy" id="copyBtn" onclick="copyToClipboard()" style="display:none;">Copy List</button>
        </div>

        <div id="result"></div>
    </div>
</div>

<footer>
    <img src="https://i.supaimg.com/bd62b939-bede-4569-8006-ec143f41d2d7/532211f1-9f43-4a22-8471-d3a0bb9e9b1e.jpg" class="dev-image">
    <span class="dev-text">Developer: Tanvir Boss</span>
</footer>

<div class="floating-btn" onclick="openChat()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" style="width:40px; height:40px;">
    <div class="tooltip">Contact Developer</div>
</div>

<script>
function openRegister() {
    window.open("https://bdwin24.biz?inviteCode=NW3KPKN&from=web", "_blank");
}

function openLogin() {
    window.open("http://1BDWin24.com", "_blank");
}

// stars logic
const canvas = document.getElementById("starsCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let stars = [];
for (let i = 0; i < 100; i++) {
    stars.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        size: Math.random() * 2,
        vx: Math.random() * 0.5 - 0.25,
        vy: Math.random() * 0.5 - 0.25
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(star => {
        star.x += star.vx;
        star.y += star.vy;

        if (star.x < 0 || star.x > canvas.width) star.vx *= -1;
        if (star.y < 0 || star.y > canvas.height) star.vy *= -1;

        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();
    });

    requestAnimationFrame(animate);
}
animate();

// generator logic
function generate() {
    let amount = parseFloat(document.getElementById("amount").value);
    let steps = parseInt(document.getElementById("steps").value);
    let result = document.getElementById("result");
    let copyBtn = document.getElementById("copyBtn");

    if (isNaN(amount) || isNaN(steps) || amount <= 0 || steps <= 0) {
        result.innerHTML = "<p style='color:red;'>❌ Invalid input</p>";
        copyBtn.style.display = "none";
        return;
    }

    let ratio = 2;
    let first = amount * (ratio - 1) / (Math.pow(ratio, steps) - 1);
    let total = 0;

    let html = "<table><tr><th>Step</th><th>Amount</th></tr>";

    for (let i = 0; i < steps; i++) {
        let value = first * Math.pow(ratio, i);
        total += value;
        html += `<tr><td>Step ${i+1}</td><td>${value.toFixed(2)} ৳</td></tr>`;
    }

    html += "</table>";
    html += `<div class="total">Total: ${total.toFixed(2)} ৳</div>`;

    result.innerHTML = html;
    copyBtn.style.display = "inline-block";
}

function resetForm() {
    document.getElementById("amount").value = "";
    document.getElementById("steps").value = "";
    document.getElementById("result").innerHTML = "";
    document.getElementById("copyBtn").style.display = "none";
}

// Fixed Copy Function (Works everywhere)
function copyToClipboard() {
    const table = document.querySelector("table");
    const totalDiv = document.querySelector(".total");

    if (!table || !totalDiv) return;

    let text = "--- Step List ---\n";
    const rows = table.querySelectorAll("tr");

    rows.forEach((row, i) => {
        if (i === 0) return;
        const cols = row.querySelectorAll("td");
        if (cols.length >= 2) {
            text += `${cols[0].innerText}: ${cols[1].innerText}\n`;
        }
    });

    text += "\n" + totalDiv.innerText;

    // Fallback logic for all browsers/protocols
    const textArea = document.createElement("textarea");
    textArea.value = text;
    document.body.appendChild(textArea);
    textArea.select();
    try {
        document.execCommand('copy');
        alert("Copied to clipboard!");
    } catch (err) {
        alert("Unable to copy");
    }
    document.body.removeChild(textArea);
}

function openChat() {
    window.open("https://t.me/THIS_IS_BOSS", "_blank");
}
</script>

</body>
</html>
