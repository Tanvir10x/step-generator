<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step Generator Galaxy Pro</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: radial-gradient(ellipse at bottom, #0b0f2a 0%, #000 100%);
    color: white;
    text-align: center;
    overflow-x: hidden;
    overflow-y: auto;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

h1 {
    margin-top: 20px;
    color: #38bdf8;
    text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
}

.container {
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    max-width: 400px;
    margin: auto;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
}

input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.3);
    color: white;
    outline: none;
}

input:focus {
    border-color: #22c55e;
}

.button-group {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 15px;
    flex-wrap: wrap;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button.reset { background: #ef4444; }
button.copy { background: #3b82f6; }

button:hover {
    transform: translateY(-2px);
    filter: brightness(1.1);
}

table {
    margin: 20px auto;
    border-collapse: collapse;
    width: 100%;
}

td, th {
    border: 1px solid rgba(255,255,255,0.1);
    padding: 12px;
}

th {
    background: rgba(34, 197, 94, 0.2);
    color: #4ade80;
}

.total {
    margin-top: 15px;
    font-size: 20px;
    color: #4ade80;
    font-weight: bold;
    border-top: 1px solid rgba(255,255,255,0.2);
    padding-top: 10px;
}

footer {
    margin-top: 30px;
    padding-bottom: 20px;
    color: #94a3b8;
    font-size: 13px;
}

.floating-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #22c55e;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
}

.tooltip {
    position: absolute;
    bottom: 75px;
    right: 0;
    background: black;
    padding: 5px 10px;
    border-radius: 5px;
    display: none;
    white-space: nowrap;
}

.floating-btn:hover .tooltip {
    display: block;
}
</style>
</head>

<body>

<canvas id="starsCanvas"></canvas>

<h1>🌌 Step Generator Pro</h1>

<div class="container">
    <div class="card">
        <input type="number" id="amount" placeholder="Total Amount (1000)">
        <input type="number" id="steps" placeholder="Total Steps (8)">

        <div class="button-group">
            <button onclick="generate()">Generate</button>
            <button class="reset" onclick="resetForm()">Reset</button>
            <button class="copy" id="copyBtn" onclick="copyToClipboard()" style="display:none;">Copy List</button>
        </div>

        <div id="result"></div>
    </div>
</div>

<footer>
    👨‍💻 Developer: Tanvir Boss
</footer>

<div class="floating-btn" onclick="openChat()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" 
         alt="Telegram" 
         style="width:40px; height:40px;">
    <div class="tooltip">Contact Developer</div>
</div>

<script>
// --- Background Stars Animation ---
const canvas = document.getElementById("starsCanvas");
const ctx = canvas.getContext("2d");
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener("resize", resizeCanvas);
let stars = [];
for (let i = 0; i < 100; i++) {
    stars.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        size: Math.random() * 2,
        vx: Math.random() * 0.5 - 0.25,
        vy: Math.random() * 0.5 - 0.25
    });
}
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(star => {
        star.x += star.vx; star.y += star.vy;
        if (star.x < 0 || star.x > canvas.width) star.vx *= -1;
        if (star.y < 0 || star.y > canvas.height) star.vy *= -1;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
animate();

// --- Main Generator Function ---
function generate() {
    let amount = parseFloat(document.getElementById("amount").value);
    let steps = parseInt(document.getElementById("steps").value);
    let result = document.getElementById("result");
    let copyBtn = document.getElementById("copyBtn");

    if (isNaN(amount) || isNaN(steps) || amount <= 0 || steps <= 0) {
        result.innerHTML = "<p style='color: #ef4444; margin-top:15px;'>❌ Please enter valid values</p>";
        copyBtn.style.display = "none";
        return;
    }

    let ratio = 2;
    let first = amount * (ratio - 1) / (Math.pow(ratio, steps) - 1);
    let total = 0;
    let html = "<table><tr><th>Step</th><th>Amount</th></tr>";

    for (let i = 0; i < steps; i++) {
        let value = first * Math.pow(ratio, i);
        total += value;
        html += `<tr><td>Step ${i+1}</td><td>${value.toFixed(2)} ৳</td></tr>`;
    }

    html += "</table>";
    html += `<div class="total">Total: ${total.toFixed(2)} ৳</div>`;

    result.innerHTML = html;
    copyBtn.style.display = "inline-block";
}

// --- Reset Function ---
function resetForm() {
    document.getElementById("amount").value = "";
    document.getElementById("steps").value = "";
    document.getElementById("result").innerHTML = "";
    document.getElementById("copyBtn").style.display = "none";
}

// --- Advanced Copy Function ---
function copyToClipboard() {
    const table = document.querySelector("table");
    const totalDiv = document.querySelector(".total");
    if (!table || !totalDiv) return;

    let textToCopy = "--- Step List ---\n";
    const rows = table.querySelectorAll("tr");
    rows.forEach((row, index) => {
        if (index === 0) return;
        const cols = row.querySelectorAll("td");
        textToCopy += `${cols[0].innerText}: ${cols[1].innerText}\n`;
    });
    textToCopy += "\n" + totalDiv.innerText;

    // Modern Method
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(textToCopy).then(() => {
            alert("✅ Copied to clipboard!");
        }).catch(() => fallbackCopy(textToCopy));
    } else {
        fallbackCopy(textToCopy);
    }
}

// Fallback for non-https or older browsers
function fallbackCopy(text) {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    document.body.appendChild(textArea);
    textArea.select();
    try {
        document.execCommand('copy');
        alert("✅ Copied to clipboard!");
    } catch (err) {
        alert("❌ Error: Use a proper browser to copy.");
    }
    document.body.removeChild(textArea);
}

// Keyboard Support
document.addEventListener("keyup", (e) => { if (e.key === "Enter") generate(); });

function openChat() { window.open("https://t.me/THIS_IS_BOSS", "_blank"); }
</script>

</body>
</html>
