<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step Generator Pro</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
}

/* Header */
h1 {
    margin-top: 25px;
    color: #38bdf8;
    font-size: 28px;
}

/* Card Style */
.container {
    margin-top: 20px;
    padding: 20px;
}

input {
    padding: 12px;
    margin: 8px;
    border-radius: 10px;
    border: none;
    width: 80%;
    max-width: 300px;
    outline: none;
}

/* Button */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #22c55e, #16a34a);
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Step box */
.step {
    background: rgba(255,255,255,0.08);
    margin: 8px auto;
    padding: 12px;
    width: 85%;
    max-width: 320px;
    border-radius: 12px;
    backdrop-filter: blur(5px);
}

/* Result */
.result {
    margin-top: 20px;
}

/* Footer */
footer {
    margin-top: 40px;
    color: #94a3b8;
    font-size: 13px;
}

/* Floating Button (WhatsApp Style + Pulse) */
.floating-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #22c55e;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(34,197,94,0.6);
    animation: pulse 1.5s infinite;
    transition: 0.3s;
}

.floating-btn:hover {
    transform: scale(1.1);
}

/* Pulse Animation */
@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
    70% { box-shadow: 0 0 0 15px rgba(34,197,94,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
}
</style>

</head>
<body>

<h1>💰 Step Generator Pro</h1>

<div class="container">

<input type="number" id="amount" placeholder="মোট টাকা (যেমন 500)">
<br>
<input type="number" id="steps" placeholder="স্টেপ সংখ্যা (যেমন 8)">
<br>

<button onclick="generate()">Generate</button>

<div class="result" id="result"></div>

</div>

<footer>
👨‍💻 Developer: Tanvir Boss
</footer>

<!-- Floating Telegram Button -->
<div class="floating-btn" onclick="openChat()">
💬
</div>

<script>
function generate() {

    let amount = parseFloat(document.getElementById("amount").value);
    let steps = parseInt(document.getElementById("steps").value);
    let result = document.getElementById("result");

    result.innerHTML = "";

    if (isNaN(amount) || isNaN(steps) || steps <= 0) {
        result.innerHTML = "❌ সঠিকভাবে ইনপুট দাও";
        return;
    }

    let ratio = 2;
    let first = amount * (ratio - 1) / (Math.pow(ratio, steps) - 1);

    let total = 0;

    for (let i = 0; i < steps; i++) {
        let value = first * Math.pow(2, i);
        total += value;

        let div = document.createElement("div");
        div.className = "step";
        div.innerHTML = "Step " + (i+1) + ": " + value.toFixed(2) + " টাকা";
        result.appendChild(div);
    }

    let totalDiv = document.createElement("h2");
    totalDiv.innerHTML = "মোট: " + total.toFixed(2) + " টাকা";
    result.appendChild(totalDiv);
}

function openChat() {
    window.open("http://t.me/THIS_IS_BOSS", "_blank");
}
</script>

</body>
</html>
